<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program 13 - Dynamic Theme Changer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Geist", sans-serif;
            transition: background 0.4s ease, color 0.4s ease;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Default Light Theme */
        body {
            background: #ffffff;
            color: #111111;
        }

        body header {
            background: #111111;
            color: #ffffff;
        }

        body .theme-btn {
            border: 3px solid #eeeeee;
            background: #ffffff;
            color: #111;
        }

        body .theme-btn.active {
            border-color: #111111;
            transform: scale(1.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        body .showcase-box {
            border: 2px dashed #ccc;
        }

        /* Dark Theme */
        body.dark {
            background: #121212;
            color: #f5f5f5;
        }

        body.dark header {
            background: #000000;
        }

        body.dark .theme-btn {
            border: 3px solid #222222;
            background: #1e1e1e;
            color: #f5f5f5;
        }

        body.dark .theme-btn.active {
            border-color: #ffffff;
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.05);
        }

        body.dark .showcase-box {
            border-color: #444;
        }

        /* Blue Theme */
        body.blue {
            background: #e3f2fd;
            color: #0d47a1;
        }

        body.blue header {
            background: #0d47a1;
        }

        body.blue .theme-btn {
            border: 3px solid #bbdefb;
            background: #ffffff;
            color: #0d47a1;
        }

        body.blue .theme-btn.active {
            border-color: #0d47a1;
        }

        body.blue .showcase-box {
            border-color: #90caf9;
        }

        /* Green Theme */
        body.green {
            background: #e8f5e9;
            color: #1b5e20;
        }

        body.green header {
            background: #1b5e20;
        }

        body.green .theme-btn {
            border: 3px solid #c8e6c9;
            background: #ffffff;
            color: #1b5e20;
        }

        body.green .theme-btn.active {
            border-color: #1b5e20;
        }

        body.green .showcase-box {
            border-color: #a5d6a7;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            transition: background 0.4s ease;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .theme-container {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            margin-bottom: 50px;
        }

        .theme-btn {
            padding: 25px;
            width: 150px;
            height: 150px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border-radius: 24px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .theme-btn .icon {
            font-size: 3rem;
        }

        .theme-btn:hover {
            transform: translateY(-5px);
        }

        .showcase-box {
            max-width: 600px;
            width: 100%;
            padding: 40px;
            text-align: center;
            border-radius: 20px;
            transition: border-color 0.4s;
        }

        .showcase-box h2 {
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .showcase-box p {
            font-size: 1.2rem;
            line-height: 1.6;
            opacity: 0.8;
        }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <h1>Theme Switcher</h1>
        <p>Experience seamless dynamic theme transitions</p>
    </header>

    <main>
        <div class="theme-container">
            <button class="theme-btn active" onclick="setTheme('', event)">
                <span class="icon">☀️</span>
                Light
            </button>
            <button class="theme-btn" onclick="setTheme('dark', event)">
                <span class="icon">🌙</span>
                Dark
            </button>
            <button class="theme-btn" onclick="setTheme('blue', event)">
                <span class="icon">🌊</span>
                Blue
            </button>
            <button class="theme-btn" onclick="setTheme('green', event)">
                <span class="icon">🌿</span>
                Green
            </button>
        </div>

        <div class="showcase-box">
            <h2>Live Preview</h2>
            <p>UI Elements Demonstration</p>
        </div>
    </main>


    <script>
        function setTheme(theme, event) {
            document.body.className = theme;

            // Update active button
            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // Save to localStorage
            localStorage.setItem('selectedTheme', theme);
        }

        // Load saved theme on page load
        const saved = localStorage.getItem('selectedTheme');
        if (saved) {
            document.body.className = saved;
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.classList.remove('active');
                const btnTheme = btn.getAttribute('onclick').match(/'(.*)'/)[1];
                if (btnTheme === saved) btn.classList.add('active');
            });
        }
    </script>
</body>

</html>

{% extends 'base.html' %}

{% block title %}{{ action }} Student - Program 32{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-white border-bottom">
                <h3 class="mb-0">{{ action }} Student Record</h3>
            </div>
            <div class="card-body">
                <form method="post" novalidate>
                    {% csrf_token %}

                    <div class="row g-3">
                        {% for field in form %}
                        <div class="col-md-6">
                            <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                            <div class="text-danger small mt-1">{{ field.errors|striptags }}</div>
                            {% endif %}
                        </div>
                        {% endfor %}
                    </div>

                    <div class="mt-4 border-top pt-3 d-flex justify-content-end gap-2">
                        <a href="{% url 'sms_student_list' %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

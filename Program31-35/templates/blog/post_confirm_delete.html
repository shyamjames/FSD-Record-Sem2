{% extends 'base.html' %}

{% block title %}Delete Post - Program 34{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card border-danger shadow-sm">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Delete Blog Post</h4>
            </div>
            <div class="card-body text-center p-4">
                <h5 class="card-title text-danger">Are you sure you want to delete this post?</h5>
                <p class="card-text text-muted my-3 fs-5">
                    "{{ post.title }}"
                </p>
                <p class="small text-danger mb-4">This action is permanent and cannot be reversed.</p>

                <form method="post" class="d-flex justify-content-center gap-3">
                    {% csrf_token %}
                    <a href="{% url 'post_detail' post.pk %}" class="btn btn-secondary px-4">Cancel</a>
                    <button type="submit" class="btn btn-danger px-4">Confirm Deletion</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program 11 - Student Details using JSON</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Geist", sans-serif;
            background: #fff;
            color: #111;
        }

        header {
            background: #111;
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        main {
            max-width: 700px;
            margin: 30px auto;
            padding: 0 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 10px 15px;
            text-align: left;
            font-size: 0.95rem;
        }

        th {
            background: #111;
            color: #fff;
        }

        tr:nth-child(even) {
            background: #f5f5f5;
        }

        .json-section {
            margin-top: 30px;
        }

        .json-section h3 {
            margin-bottom: 10px;
        }

        .json-section pre {
            background: #f5f5f5;
            border: 1px solid #ccc;
            padding: 15px;
            overflow-x: auto;
            font-size: 0.85rem;
        }

        footer {
            background: #111;
            color: #aaa;
            text-align: center;
            padding: 15px;
            margin-top: 50px;
        }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <h1>Student Records</h1>
        <p>Student Details using JSON</p>
    </header>

    <main>
        <h2>Student Details</h2>
        <table id="studentTable">
            <thead>
                <tr>
                    <th>Roll No</th>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Grade</th>
                    <th>Course</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <div class="json-section">
            <h3>JSON Data Source</h3>
            <pre id="jsonDisplay"></pre>
        </div>
    </main>



    <script>
        // JSON data for student details
        const students = [
            { "rollNo": 1, "name": "Rahul Sharma", "age": 20, "grade": "A", "course": "Web Development" },
            { "rollNo": 2, "name": "Priya Menon", "age": 21, "grade": "A+", "course": "UI/UX Design" },
            { "rollNo": 3, "name": "Arjun Kumar", "age": 19, "grade": "B+", "course": "Full Stack Development" },
            { "rollNo": 4, "name": "Sneha Nair", "age": 20, "grade": "A", "course": "Mobile App Development" },
            { "rollNo": 5, "name": "Vikram Patel", "age": 22, "grade": "B", "course": "Data Science" }
        ];

        // Display JSON data in the pre block
        document.getElementById('jsonDisplay').textContent = JSON.stringify(students, null, 2);

        // Render table from JSON
        const tbody = document.getElementById('tableBody');
        students.forEach(student => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${student.rollNo}</td>
                <td>${student.name}</td>
                <td>${student.age}</td>
                <td>${student.grade}</td>
                <td>${student.course}</td>
            `;
            tbody.appendChild(row);
        });
    </script>
</body>

</html>

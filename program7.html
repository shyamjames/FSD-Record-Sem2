<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program 7 - Filter and Search Data Dynamically</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Geist", sans-serif;
            background: #fff;
            color: #111;
        }

        header {
            background: #111;
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        main {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
            align-items: center;
        }

        .controls input {
            flex: 1;
            min-width: 200px;
            padding: 10px;
            border: 1px solid #ccc;
            font-size: 0.95rem;
        }

        .controls select {
            padding: 10px;
            border: 1px solid #ccc;
            font-size: 0.95rem;
        }

        .results-count {
            font-size: 0.85rem;
            color: #555;
            margin-bottom: 15px;
        }

        .product-list {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .card {
            border: 1px solid #ccc;
            padding: 20px;
            width: 260px;
            text-align: center;
        }

        .card h3 {
            margin-bottom: 5px;
        }

        .card .category {
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        .card p {
            color: #555;
            font-size: 0.9rem;
        }

        .card .price {
            font-weight: bold;
            margin-top: 8px;
        }

        .no-results {
            text-align: center;
            color: #888;
            padding: 40px;
            font-size: 1.1rem;
        }

        footer {
            background: #111;
            color: #aaa;
            text-align: center;
            padding: 15px;
            margin-top: 50px;
        }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <h1>Device Store</h1>
        <p>Search &amp; Filter Products</p>
    </header>

    <main>
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search products...">
            <select id="categoryFilter">
                <option value="all">All Categories</option>
                <option value="camera">Cameras</option>
                <option value="phone">Phones</option>
                <option value="accessory">Accessories</option>
            </select>
        </div>
        <div class="results-count" id="resultsCount"></div>
        <div class="product-list" id="productList"></div>
    </main>



    <script>
        const products = [
            { name: "Canon EOS R6", category: "camera", price: "₹1,85,000", desc: "Full-frame mirrorless camera" },
            { name: "Sony A7 III", category: "camera", price: "₹1,50,000", desc: "24.2MP full-frame camera" },
            { name: "Nikon Z50", category: "camera", price: "₹85,000", desc: "Compact DX mirrorless" },
            { name: "iPhone 15 Pro", category: "phone", price: "₹1,34,900", desc: "A17 Pro chip, 48MP camera" },
            { name: "Samsung Galaxy S24", category: "phone", price: "₹79,999", desc: "200MP AI camera phone" },
            { name: "Google Pixel 8", category: "phone", price: "₹75,999", desc: "Computational photography" },
            { name: "Camera Tripod", category: "accessory", price: "₹2,500", desc: "Adjustable aluminium tripod" },
            { name: "Phone Case", category: "accessory", price: "₹499", desc: "Shockproof protective case" },
            { name: "64GB SD Card", category: "accessory", price: "₹899", desc: "High-speed memory card" }
        ];

        function renderProducts() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;

            const filtered = products.filter(p => {
                const matchSearch = p.name.toLowerCase().includes(search) || p.desc.toLowerCase().includes(search);
                const matchCategory = category === 'all' || p.category === category;
                return matchSearch && matchCategory;
            });

            const list = document.getElementById('productList');
            document.getElementById('resultsCount').textContent = `Showing ${filtered.length} of ${products.length} products`;

            if (filtered.length === 0) {
                list.innerHTML = '<div class="no-results">No products found.</div>';
                return;
            }

            list.innerHTML = filtered.map(p => `
                <div class="card">
                    <h3>${p.name}</h3>
                    <div class="category">${p.category.toUpperCase()}</div>
                    <p>${p.desc}</p>
                    <p class="price">${p.price}</p>
                </div>
            `).join('');
        }

        document.getElementById('searchInput').addEventListener('input', renderProducts);
        document.getElementById('categoryFilter').addEventListener('change', renderProducts);
        renderProducts();
    </script>
</body>

</html>

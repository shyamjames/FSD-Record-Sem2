{% extends 'base.html' %}

{% block title %}Login - Student Manager{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 40px auto;">
    <h2>Login (Program 27)</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Login</button>
    </form>
    {% if form.errors %}
    <p style="color: red; margin-top: 10px;">Invalid username or password.</p>
    {% endif %}
</div>
{% endblock %}

{% extends 'base.html' %}

{% block title %}{% if object %}Update{% else %}Add{% endif %} Student{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>{% if object %}Update Student: {{ object.name }}{% else %}Add New Student{% endif %}</h2>

    <form method="post">
        {% csrf_token %}
        <table style="width: 100%;">
            {{ form.as_table }}
        </table>

        <div style="margin-top: 20px;">
            <button type="submit" class="btn">Save</button>
            <a href="{% url 'student_list' %}" class="btn" style="background-color: #666;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

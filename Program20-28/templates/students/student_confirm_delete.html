{% extends 'base.html' %}

{% block title %}Confirm Delete{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 40px auto; text-align: center;">
    <h2>Confirm Deletion</h2>
    <p>Are you sure you want to delete the student <strong>"{{ object.name }}"</strong>?</p>
    <p style="color: #dc3545; font-size: 0.9rem; margin-bottom: 20px;">This action cannot be undone.</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'student_list' %}" class="btn">Cancel</a>
    </form>
</div>
{% endblock %}
